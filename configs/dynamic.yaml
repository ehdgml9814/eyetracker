# dynamic.yaml — 모델 구조 및 학습 하이퍼파라미터
# model.type: proposed → KernelNet + DynamicFilter + SiameseBackbone + Regressor(소)
# model.type: baseline → SiameseBackbone + LargerRegressor
#
# CLI override 예시:
#   --set model.kernel_hidden=128
#   --set model.regressor_hidden=1024
#   --set train.mode=sequential

model:
  type: proposed          # proposed | baseline
  backbone: resnet18      # 고정 (mobilenet_v2 사용 안 함)
  pretrained: true
  freeze_backbone: false
  dropout: 0.3

  # KernelNet 크기 (proposed only, baseline은 무시)
  kernel_hidden: 512      # S=128 / M=512 / L=2048
  kernel_size: 5          # 필터 커널 크기 (홀수)

  # Regressor 크기
  # proposed: 256 고정 (소형)
  # baseline: 512 / 1024 / 2048 (CLI override로 변경)
  regressor_hidden: 256

train:
  mode: e2e               # e2e | sequential
  phase1_ratio: 0.4       # sequential 전용: Phase1 비율 (0.4 → 20/50 epoch)
  batch_size: 512
  epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-4
  lr_scheduler: cosine
  lr_warmup_epochs: 0
